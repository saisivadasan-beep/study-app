<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study App — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#1a1a1a}
.card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 2px 20px rgba(0,0,0,0.08);border:0.5px solid #e5e5e0}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:56px;height:56px;background:#1D9E75;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px}
.logo h1{font-size:22px;font-weight:600}
.logo p{font-size:14px;color:#666;margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;color:#444;margin-bottom:6px}
.form-group input{width:100%;padding:11px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;color:#1a1a1a;transition:border .2s}
.form-group input:focus{outline:none;border-color:#1D9E75}
.btn{width:100%;padding:13px;background:#1D9E75;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;margin-top:8px}
.btn:disabled{background:#aaa;cursor:not-allowed}
.error{background:#FCEBEB;color:#A32D2D;padding:10px 14px;border-radius:10px;font-size:13px;margin-top:12px;display:none;line-height:1.5}
.footer{text-align:center;font-size:12px;color:#bbb;margin-top:24px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📚</div>
    <h1>Study App</h1>
    <p>ICSE Grade 9 — Smart Study Portal</p>
  </div>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter your username">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password">
  </div>
  <button class="btn" onclick="login()" id="loginBtn">Sign In</button>
  <div class="error" id="errorMsg"></div>
  <div class="footer">Study App © 2025 — Powered by Claude AI</div>
</div>
<script>
const SB_URL='https://qrsihxclhfwgcveqiyxs.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyc2loeGNsaGZ3Z2N2ZXFpeXhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3Mzg1MzMsImV4cCI6MjA5MzMxNDUzM30.tN1AbODqTjjP2mD0DYQ2t38g6-E8Qy54CS95PImazcM';
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
async function login(){
  const u=document.getElementById('username').value.trim().toLowerCase();
  const p=document.getElementById('password').value.trim();
  const btn=document.getElementById('loginBtn');
  if(!u||!p){showError('Please enter username and password');return;}
  btn.disabled=true;btn.textContent='Signing in...';
  document.getElementById('errorMsg').style.display='none';
  try{
    const res=await fetch(`${SB_URL}/rest/v1/app_users?username=eq.${encodeURIComponent(u)}&password_hash=eq.${encodeURIComponent(p)}&select=*`,
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    const data=await res.json();
    if(!data||data.length===0){showError('Invalid username or password');btn.disabled=false;btn.textContent='Sign In';return;}
    const user=data[0];
    if(!user.is_active){showError('Account disabled. Contact administrator.');btn.disabled=false;btn.textContent='Sign In';return;}
    fetch(`${SB_URL}/rest/v1/app_users?id=eq.${user.id}`,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({last_login:new Date().toISOString()})});
    fetch(`${SB_URL}/rest/v1/access_logs`,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({user_id:user.id,action:'login'})});
    sessionStorage.setItem('user',JSON.stringify(user));
    window.location.href=user.role==='admin'?'admin.html':'student.html';
  }catch(e){showError('Error: '+e.message);btn.disabled=false;btn.textContent='Sign In';}
}
function showError(msg){const e=document.getElementById('errorMsg');e.textContent=msg;e.style.display='block';}
</script>
</body>
</html>

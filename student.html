<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.topbar{background:#1a1a1a;color:#fff;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h1{font-size:15px;font-weight:500;color:#fff}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-right span{font-size:13px;color:#aaa}
.logout-btn{font-size:13px;color:#ff6b6b;cursor:pointer;background:none;border:none;padding:4px 8px}
.layout{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:210px;background:#fff;border-right:0.5px solid #e5e5e0;flex-shrink:0;overflow-y:auto;padding:12px 0}
.sidebar-label{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.5px;padding:0 16px 10px}
.subj{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.subj:hover{background:#f9f9f7}
.subj.active{background:#f0faf5;border-left-color:#1D9E75}
.subj-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.subj-name{font-size:13px;font-weight:500;color:#1a1a1a}
.subj-count{font-size:11px;color:#999;margin-top:1px}
.main{flex:1;padding:24px;overflow-y:auto}
.ph{text-align:center;padding:80px 24px;color:#999}
.ph-icon{font-size:48px;margin-bottom:12px;opacity:0.3}
.ph-title{font-size:16px;font-weight:500;color:#666}
.ph-sub{font-size:13px;margin-top:6px}
.page-hdr{margin-bottom:20px}
.page-hdr h2{font-size:20px;font-weight:600}
.page-hdr p{font-size:13px;color:#666;margin-top:3px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:20px}
.topic-card{background:#fff;border-radius:12px;padding:16px;cursor:pointer;border:0.5px solid #e5e5e0;transition:all .15s}
.topic-card:hover{border-color:#1D9E75;box-shadow:0 2px 8px rgba(29,158,117,0.1)}
.topic-card.done{border-left:3px solid #1D9E75}
.tc-num{font-size:11px;color:#999;margin-bottom:4px}
.tc-name{font-size:13px;font-weight:500;line-height:1.4}
.tc-tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.tc-tag{font-size:10px;padding:2px 6px;border-radius:8px;background:#f0f0ec;color:#666}
.tc-tag.done{background:#E1F5EE;color:#085041}
.new-card{background:#f9f9f7;border:1.5px dashed #ddd;border-radius:12px;padding:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:110px;transition:all .15s}
.new-card:hover{border-color:#1D9E75;background:#f0faf5}
.new-card span{font-size:13px;color:#999;margin-top:6px}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:#666;cursor:pointer;margin-bottom:16px;background:none;border:none;padding:6px 0}
.back-btn:hover{color:#1a1a1a}
.topic-hdr{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;border:0.5px solid #e5e5e0}
.topic-hdr h2{font-size:18px;font-weight:600;margin-bottom:4px}
.topic-hdr p{font-size:13px;color:#666}
.badges{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.tbadge{font-size:11px;padding:3px 8px;border-radius:10px;background:#E1F5EE;color:#085041}
.tabs{display:flex;background:#fff;border-radius:10px;border:0.5px solid #e5e5e0;margin-bottom:16px;overflow:hidden}
.tab{flex:1;padding:10px 6px;font-size:13px;cursor:pointer;color:#666;border:none;background:none;font-weight:500;transition:all .15s}
.tab.active{background:#1D9E75;color:#fff}
.tab-content{background:#fff;border-radius:12px;padding:20px;border:0.5px solid #e5e5e0;min-height:300px}
.upload-area{border:2px dashed #ddd;border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px}
.upload-area:hover{border-color:#1D9E75;background:#f0faf5}
.upload-area input{display:none}
.up-icon{font-size:32px;margin-bottom:8px}
.up-text{font-size:14px;font-weight:500;color:#333}
.up-sub{font-size:12px;color:#999;margin-top:4px}
.thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:16px}
.thumb{background:#f5f5f0;border-radius:8px;padding:8px;text-align:center;font-size:11px;color:#666;border:0.5px solid #e5e5e0;position:relative}
.thumb img{width:100%;height:65px;object-fit:cover;border-radius:6px;margin-bottom:4px}
.thumb-rm{position:absolute;top:4px;right:4px;background:#ff6b6b;color:#fff;border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:11px;line-height:18px;text-align:center;padding:0}
.btn-primary{background:#1D9E75;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer}
.btn-primary:hover{background:#17896A}
.btn-dark{background:#1a1a1a;color:#fff;width:100%;padding:14px;font-size:15px;margin-top:12px;border-radius:10px;border:none;cursor:pointer;font-weight:500}
.btn-dark:hover{background:#333}
.btn-sec{background:#f0f0ec;color:#333;border:none;border-radius:10px;padding:8px 16px;font-size:13px;cursor:pointer}
.pg-counter{background:#E1F5EE;color:#085041;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;display:inline-block;margin-bottom:12px}
.status-msg{font-size:13px;color:#666;text-align:center;padding:8px;min-height:24px}
.notes-content h3{font-size:15px;font-weight:600;margin:16px 0 8px}
.notes-content h3:first-child{margin-top:0}
.notes-content h4{font-size:14px;font-weight:600;margin:12px 0 6px;color:#333}
.notes-content p{font-size:14px;color:#333;line-height:1.75;margin-bottom:10px}
.notes-content ul{padding-left:20px;margin-bottom:10px}
.notes-content li{font-size:14px;color:#333;line-height:1.75;margin-bottom:4px}
.notes-content .formula{background:#f5f5f0;border:0.5px solid #ddd;border-radius:8px;padding:10px 14px;font-family:monospace;font-size:13px;margin:8px 0;text-align:center}
.notes-content .highlight{background:#FFF9E6;border-left:3px solid #F59E0B;padding:10px 14px;border-radius:0 8px 8px 0;margin:10px 0;font-size:14px;line-height:1.6}
.notes-content .mnemonic{background:#FAEEDA;border-radius:8px;padding:10px 14px;margin:8px 0;font-size:13px;color:#633806;line-height:1.6}
.notes-content table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.notes-content th{background:#f5f5f0;padding:8px 12px;text-align:left;font-weight:500;border-bottom:1px solid #e5e5e0}
.notes-content td{padding:8px 12px;border-bottom:0.5px solid #f0f0ec;color:#444;line-height:1.5}
.fc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}
.fc{border:0.5px solid #e5e5e0;border-radius:12px;padding:14px;cursor:pointer;min-height:88px;display:flex;flex-direction:column;justify-content:center;text-align:center;transition:all .2s;background:#fff}
.fc:hover{border-color:#1D9E75}
.fc.flipped{background:#f0faf5;border-color:#1D9E75}
.fc-q{font-size:13px;font-weight:500;line-height:1.4}
.fc-a{font-size:12px;color:#085041;margin-top:8px;display:none;line-height:1.5}
.fc.flipped .fc-a{display:block}
.fc.flipped .fc-q{color:#085041}
.fc-hint{font-size:11px;color:#ccc;margin-top:6px}
.fc.flipped .fc-hint{display:none}
.quiz-item{border:0.5px solid #e5e5e0;border-radius:12px;padding:16px;margin-bottom:12px;background:#fff}
.quiz-q{font-size:14px;font-weight:500;margin-bottom:10px;line-height:1.5}
.quiz-opts{display:flex;flex-direction:column;gap:6px}
.quiz-opt{padding:9px 14px;border:0.5px solid #e5e5e0;border-radius:8px;font-size:13px;cursor:pointer;text-align:left;background:#fff;transition:background .15s;color:#1a1a1a}
.quiz-opt:hover:not(:disabled){background:#f5f5f0}
.quiz-opt.correct{background:#E1F5EE;border-color:#1D9E75;color:#085041}
.quiz-opt.wrong{background:#FCEBEB;border-color:#E24B4A;color:#A32D2D}
.quiz-exp{font-size:12px;color:#666;margin-top:8px;padding:8px;background:#f9f9f7;border-radius:8px;display:none;line-height:1.5}
.score-banner{background:#1D9E75;color:#fff;border-radius:10px;padding:14px;text-align:center;margin-bottom:16px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:420px}
.modal h3{font-size:17px;font-weight:600;margin-bottom:16px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:13px;font-weight:500;color:#444;margin-bottom:5px}
.fg input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;color:#1a1a1a}
.fg input:focus{outline:none;border-color:#1D9E75}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.92);display:none;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:14px}
.loading-overlay.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid #e5e5e0;border-top-color:#1D9E75;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:15px;color:#333;font-weight:500}
.loading-sub{font-size:13px;color:#999}
.empty{text-align:center;padding:48px 24px;color:#999}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.35}
.empty-title{font-size:15px;font-weight:500;color:#666}
.empty-sub{font-size:13px;margin-top:6px;line-height:1.6;max-width:300px;margin-left:auto;margin-right:auto}
</style>
</head>
<body>
<div class="topbar">
  <h1>📚 Study App</h1>
  <div class="topbar-right">
    <span id="studentName"></span>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-label">Subjects</div>
    <div id="subjectList"></div>
  </div>
  <div class="main" id="mainContent">
    <div class="ph"><div class="ph-icon">👈</div><div class="ph-title">Select a subject</div><div class="ph-sub">Choose from the left to start studying</div></div>
  </div>
</div>
<div class="modal-overlay" id="newTopicModal">
  <div class="modal">
    <h3>New Topic</h3>
    <div class="fg"><label>Topic / Chapter Name</label><input type="text" id="newTopicName" placeholder="e.g. Laws of Motion, Hydrogen..."></div>
    <div class="modal-actions">
      <button class="btn-sec" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="createTopic()">Start Topic</button>
    </div>
  </div>
</div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Processing...</div>
  <div class="loading-sub" id="loadingSub">Please wait</div>
</div>
<script>
const SB='https://qrsihxclhfwgcveqiyxs.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyc2loeGNsaGZ3Z2N2ZXFpeXhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3Mzg1MzMsImV4cCI6MjA5MzMxNDUzM30.tN1AbODqTjjP2mD0DYQ2t38g6-E8Qy54CS95PImazcM';
const WORKER='https://study-app-claude.sai-sivadasan.workers.dev';
const GH={'apikey':SK,'Authorization':'Bearer '+SK};

async function sbGet(t,q){
  try{const r=await fetch(SB+'/rest/v1/'+t+'?'+q,{headers:GH});return await r.json();}
  catch(e){return [];}
}
async function sbPost(t,b){
  try{const r=await fetch(SB+'/rest/v1/'+t,{method:'POST',headers:{...GH,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(b)});return await r.json();}
  catch(e){return null;}
}
async function sbPatch(t,q,b){
  try{await fetch(SB+'/rest/v1/'+t+'?'+q,{method:'PATCH',headers:{...GH,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(b)});}
  catch(e){}
}

const user=JSON.parse(sessionStorage.getItem('user')||'null');
if(!user||user.role!=='student'){window.location.href='index.html';}
document.getElementById('studentName').textContent=user.name;

const SUBJECTS=[
  {id:'physics',name:'Physics',icon:'⚛',color:'#378ADD',bg:'#E6F1FB'},
  {id:'chemistry',name:'Chemistry',icon:'🧪',color:'#1D9E75',bg:'#E1F5EE'},
  {id:'biology',name:'Biology',icon:'🌿',color:'#D85A30',bg:'#FAECE7'},
  {id:'maths',name:'Mathematics',icon:'∑',color:'#BA7517',bg:'#FAEEDA'},
  {id:'geography',name:'Geography',icon:'🌍',color:'#534AB7',bg:'#EEEDFE'},
  {id:'history',name:'History',icon:'📜',color:'#5F5E5A',bg:'#F1EFE8'},
];

var curSubject=null,curTopic=null,curTab='upload',allTopics=[],uploadedImages=[],quizAnswered=0,quizScore=0;

async function loadTopics(){
  try{
    var data=await sbGet('topics','user_id=eq.'+user.id+'&select=*');
    allTopics=Array.isArray(data)?data:[];
  }catch(e){allTopics=[];}
  renderSidebar();
}

function renderSidebar(){
  var html='';
  for(var i=0;i<SUBJECTS.length;i++){
    var s=SUBJECTS[i];
    var cnt=0;
    for(var j=0;j<allTopics.length;j++){if(allTopics[j].subject===s.id)cnt++;}
    html+='<div class="subj '+(curSubject&&curSubject.id===s.id?'active':'')+'" onclick="selectSubject(\''+s.id+'\')">';
    html+='<div class="subj-icon" style="background:'+s.bg+';color:'+s.color+'">'+s.icon+'</div>';
    html+='<div><div class="subj-name">'+s.name+'</div><div class="subj-count">'+cnt+' topic'+(cnt!==1?'s':'')+'</div></div>';
    html+='</div>';
  }
  document.getElementById('subjectList').innerHTML=html;
}

function selectSubject(id){
  curSubject=null;
  for(var i=0;i<SUBJECTS.length;i++){if(SUBJECTS[i].id===id){curSubject=SUBJECTS[i];break;}}
  curTopic=null;curTab='upload';
  renderSidebar();
  renderSubjectView();
}

function safeLen(str,key){
  try{return JSON.parse(str||'[]').length;}catch(e){return 0;}
}

function renderSubjectView(){
  var topics=[];
  for(var i=0;i<allTopics.length;i++){if(allTopics[i].subject===curSubject.id)topics.push(allTopics[i]);}
  var html='<div class="page-hdr"><h2>'+curSubject.icon+' '+curSubject.name+'</h2><p>Your study topics</p></div><div class="grid">';
  for(var i=0;i<topics.length;i++){
    var t=topics[i];
    var fc=safeLen(t.flashcards);var qz=safeLen(t.quiz);
    html+='<div class="topic-card '+(t.status==='completed'?'done':'')+'" onclick="openTopic(\''+t.id+'\')">';
    html+='<div class="tc-num">Topic '+(i+1)+'</div><div class="tc-name">'+t.topic_name+'</div><div class="tc-tags">';
    if(t.notes)html+='<span class="tc-tag done">Notes</span>';
    if(fc)html+='<span class="tc-tag done">'+fc+' cards</span>';
    if(qz)html+='<span class="tc-tag done">'+qz+' Qs</span>';
    if(!t.notes)html+='<span class="tc-tag">Upload pages</span>';
    html+='</div></div>';
  }
  html+='<div class="new-card" onclick="openNewTopicModal()"><div style="font-size:28px;color:#ccc">+</div><span>New Topic</span></div>';
  html+='</div>';
  document.getElementById('mainContent').innerHTML=html;
}

function openTopic(id){
  for(var i=0;i<allTopics.length;i++){if(allTopics[i].id===id){curTopic=allTopics[i];break;}}
  uploadedImages=[];quizAnswered=0;quizScore=0;curTab='upload';
  sbPost('access_logs',{user_id:user.id,action:'view',subject:curSubject.name,topic:curTopic.topic_name});
  renderTopicView();
}

function renderTopicView(){
  var t=curTopic;
  var fc=safeLen(t.flashcards);var qz=safeLen(t.quiz);
  var html='<button class="back-btn" onclick="selectSubject(\''+curSubject.id+'\')">← Back to '+curSubject.name+'</button>';
  html+='<div class="topic-hdr"><div style="font-size:12px;color:#1D9E75;font-weight:500;margin-bottom:4px">'+curSubject.name+'</div>';
  html+='<h2>'+t.topic_name+'</h2><p>'+(t.page_count||0)+' pages uploaded · '+(t.status==='completed'?'Completed':'In Progress')+'</p>';
  html+='<div class="badges">';
  if(t.notes)html+='<span class="tbadge">Notes ready</span>';
  if(fc)html+='<span class="tbadge">'+fc+' flashcards</span>';
  if(qz)html+='<span class="tbadge">'+qz+' quiz questions</span>';
  html+='</div></div>';
  html+='<div class="tabs">';
  var tabs=['upload','notes','flash','quiz','mindmap','chat','sim'];
  var tabNames=['Upload','Notes','Flashcards','Quiz','Mind Map','Ask AI','Simulation'];
  for(var i=0;i<tabs.length;i++){
    html+='<button class="tab '+(curTab===tabs[i]?'active':'')+'" onclick="switchTab(\''+tabs[i]+'\')">'+tabNames[i]+'</button>';
  }
  html+='</div><div class="tab-content" id="tabContent"></div>';
  document.getElementById('mainContent').innerHTML=html;
  renderTab();
}

function switchTab(tab){
  curTab=tab;
  renderTopicView();
}

function renderTab(){
  var tc=document.getElementById('tabContent');
  if(!tc)return;
  var t=curTopic;
  var flashcards=[];var quiz=[];
  try{flashcards=JSON.parse(t.flashcards||'[]');}catch(e){}
  try{quiz=JSON.parse(t.quiz||'[]');}catch(e){}

  if(curTab==='upload'){
    var savedNotes=t.notes||'';
    var html='<div style="margin-bottom:10px">';
    html+='<p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px">Paste your chapter notes below, then click the button to auto-generate flashcards, quiz and simulation.</p>';
    html+='<textarea id="notesInput" style="width:100%;min-height:240px;padding:12px;border:1px solid;border-color:var(--color-border-secondary);border-radius:8px;font-size:13px;color:var(--color-text-primary);background:var(--color-background-primary);line-height:1.6;resize:vertical" placeholder="Paste your detailed chapter notes here...">'+savedNotes+'</textarea>';
    html+='</div>';
    html+='<button class="btn-dark" onclick="saveAndGenerate()">Generate Flashcards, Quiz and Simulation from Notes</button>';
    html+='<div class="status-msg" id="statusMsg"></div>';
    tc.innerHTML=html;
} else if(curTab==='notes'){
    tc.innerHTML=t.notes?('<div class="notes-content">'+t.notes+'</div>'):'<div class="empty"><div class="empty-icon">📝</div><div class="empty-title">No notes yet</div><div class="empty-sub">Upload pages then click Finish Chapter.</div></div>';
  } else if(curTab==='flash'){
    if(flashcards.length){
      var html='<div style="font-size:12px;color:#666;margin-bottom:12px">Tap to flip · '+flashcards.length+' cards</div><div class="fc-grid">';
      for(var i=0;i<flashcards.length;i++){
        html+='<div class="fc" id="fc'+i+'" onclick="this.classList.toggle(\'flipped\')"><div class="fc-q">'+flashcards[i].q+'</div><div class="fc-a">'+flashcards[i].a+'</div><div class="fc-hint">tap to reveal</div></div>';
      }
      tc.innerHTML=html+'</div>';
    } else {
      tc.innerHTML='<div class="empty"><div class="empty-icon">🃏</div><div class="empty-title">No flashcards yet</div><div class="empty-sub">Generated when you finish the chapter.</div></div>';
    }
  } else if(curTab==='quiz'){
    if(quiz.length){
      quizAnswered=0;quizScore=0;
      var html='<div class="score-banner" id="scoreBanner" style="display:none"><h3 id="scoreText"></h3><p id="scoreMsg"></p></div>';
      for(var i=0;i<quiz.length;i++){
        var q=quiz[i];
        html+='<div class="quiz-item"><div class="quiz-q">Q'+(i+1)+'. '+q.q+'</div><div class="quiz-opts">';
        for(var j=0;j<q.opts.length;j++){
          html+='<button class="quiz-opt" id="qo_'+i+'_'+j+'" onclick="answerQuiz('+i+','+j+','+q.ans+')">'+String.fromCharCode(65+j)+'. '+q.opts[j]+'</button>';
        }
        html+='</div><div class="quiz-exp" id="qexp_'+i+'">'+(q.exp||'')+'</div></div>';
      }
      html+='<button class="btn-sec" onclick="switchTab(\'quiz\')" style="margin-top:8px">Reset Quiz</button>';
      tc.innerHTML=html;
    } else {
      tc.innerHTML='<div class="empty"><div class="empty-icon">❓</div><div class="empty-title">No quiz yet</div><div class="empty-sub">Generated when you finish the chapter.</div></div>';
    }
  } else if(curTab==='sim'){
    if(t.simulation){
      var simData=null;
      try{simData=JSON.parse(t.simulation);}catch(e){simData=null;}

function handleFiles(files){
  Array.from(files).forEach(function(f){
    if(f.type==='application/pdf'||f.name.toLowerCase().endsWith('.pdf')){
      handlePDF(f);
    } else {
      var r=new FileReader();
      r.onload=function(e){uploadedImages.push({file:f,dataUrl:e.target.result});renderThumbs();};
      r.readAsDataURL(f);
    }
  });
}

async function handlePDF(file){
  showLoading('Converting PDF pages to images...','This may take a few seconds');
  try{
    // Load PDF.js
    if(!window.pdfjsLib){
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
      window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
    var arrayBuffer=await file.arrayBuffer();
    var pdf=await window.pdfjsLib.getDocument({data:arrayBuffer}).promise;
    var numPages=pdf.numPages;
    for(var i=1;i<=numPages;i++){
      var page=await pdf.getPage(i);
      var viewport=page.getViewport({scale:1.5});
      var canvas=document.createElement('canvas');
      canvas.width=viewport.width;canvas.height=viewport.height;
      var ctx=canvas.getContext('2d');
      await page.render({canvasContext:ctx,viewport:viewport}).promise;
      var dataUrl=canvas.toDataURL('image/jpeg',0.85);
      uploadedImages.push({file:{name:'page_'+i+'.jpg',type:'image/jpeg'},dataUrl:dataUrl});
    }
    hideLoading();
    renderThumbs();
    document.getElementById('statusMsg').textContent='✓ '+numPages+' PDF pages converted to images!';
  }catch(e){hideLoading();alert('PDF error: '+e.message);}
}

function loadScript(src){
  return new Promise(function(resolve,reject){
    var s=document.createElement('script');s.src=src;
    s.onload=resolve;s.onerror=reject;
    document.head.appendChild(s);
  });
}

function convertToJpeg(dataUrl){
  return new Promise(function(resolve){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      // Resize if too large - max 1500px on longest side
      var maxSize=1500;
      var w=img.width,h=img.height;
      if(w>maxSize||h>maxSize){
        if(w>h){h=Math.round(h*maxSize/w);w=maxSize;}
        else{w=Math.round(w*maxSize/h);h=maxSize;}
      }
      canvas.width=w;canvas.height=h;
      var ctx=canvas.getContext('2d');
      ctx.fillStyle='#FFFFFF';
      ctx.fillRect(0,0,w,h);
      ctx.drawImage(img,0,0,w,h);
      var jpeg=canvas.toDataURL('image/jpeg',0.85);
      resolve(jpeg.split('base64,')[1]);
    };
    img.onerror=function(){resolve(null);};
    img.src=dataUrl;
  });
}

  return r.json();
}

    var raw = d.content&&d.content[0]?d.content[0].text:'';
    var bt = String.fromCharCode(96);
    raw = raw.replace(new RegExp(bt+bt+bt+'json','g'),'').replace(new RegExp(bt+bt+bt,'g'),'').trim();
    var mm = null;
    try{mm=JSON.parse(raw);}catch(e){var m=raw.match(/\{[\s\S]*\}/);if(m)try{mm=JSON.parse(m[0]);}catch(e2){}}

    if(!mm || !mm.branches){
      document.getElementById('mmWrap').innerHTML='<div style="color:#e63946;font-size:13px">Could not generate mind map. Try again.</div>';
      return;
    }

    var svg = buildMindMapSVG(mm);
    document.getElementById('mmWrap').innerHTML = svg;
  } catch(e) {
    document.getElementById('mmWrap').innerHTML='<div style="color:#e63946;font-size:13px">Error: '+e.message+'</div>';
  }
}

function buildMindMapSVG(mm) {
  var W=800, H=520, cx=W/2, cy=H/2, cr=60;
  var branches = mm.branches || [];
  var n = branches.length;
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:500px">';
  // Center
  svg += '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+cr+'" ry="38" fill="#1D9E75"/>';
  var centerWords = (mm.center||'').split(' ');
  var cy1 = centerWords.length>2 ? cy-8 : cy;
  for(var wi=0;wi<Math.min(centerWords.length,3);wi++){
    svg += '<text x="'+cx+'" y="'+(cy1+wi*16)+'" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff" font-family="sans-serif">'+centerWords[wi]+'</text>';
  }

  branches.forEach(function(b, i){
    var angle = (i/n)*2*Math.PI - Math.PI/2;
    var branchR = 200;
    var bx = cx + Math.cos(angle)*branchR;
    var by = cy + Math.sin(angle)*branchR;
    var color = b.color || '#2563EB';

    // Line to branch
    svg += '<line x1="'+cx+'" y1="'+cy+'" x2="'+bx+'" y2="'+by+'" stroke="'+color+'" stroke-width="2.5" stroke-opacity="0.6"/>';

    // Branch node
    var bw=100, bh=32;
    svg += '<rect x="'+(bx-bw/2)+'" y="'+(by-bh/2)+'" width="'+bw+'" height="'+bh+'" rx="16" fill="'+color+'"/>';
    svg += '<text x="'+bx+'" y="'+(by+5)+'" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff" font-family="sans-serif">'+b.label+'</text>';

    // Sub-nodes
    var nodes = b.nodes || [];
    nodes.slice(0,4).forEach(function(nd, j){
      var subAngle = angle + (j - (nodes.length-1)/2)*0.45;
      var subR = 120;
      var sx = bx + Math.cos(subAngle)*subR;
      var sy = by + Math.sin(subAngle)*subR;
      // Keep within bounds
      sx = Math.max(80, Math.min(W-80, sx));
      sy = Math.max(20, Math.min(H-20, sy));

      svg += '<line x1="'+bx+'" y1="'+by+'" x2="'+sx+'" y2="'+sy+'" stroke="'+color+'" stroke-width="1.2" stroke-opacity="0.4" stroke-dasharray="4,3"/>';

      var sw = Math.min(130, nd.length*7+20);
      svg += '<rect x="'+(sx-sw/2)+'" y="'+(sy-12)+'" width="'+sw+'" height="24" rx="6" fill="'+color+'" fill-opacity="0.12" stroke="'+color+'" stroke-width="1"/>';
      var shortNd = nd.length>18 ? nd.slice(0,17)+'…' : nd;
      svg += '<text x="'+sx+'" y="'+(sy+5)+'" text-anchor="middle" font-size="9" fill="'+color+'" font-family="sans-serif" font-weight="600">'+shortNd+'</text>';
    });
  });

  svg += '</svg>';
  return '<div style="padding:8px;overflow-x:auto">'+svg+'<div style="font-size:11px;color:#888;text-align:center;margin-top:6px">Mind map auto-generated from your notes</div></div>';
}

// ── CHAT ──
var chatHistory = [];

async function sendChat() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if(!msg) return;
  input.value = '';

  var messages = document.getElementById('chatMessages');
  // User bubble
  messages.innerHTML += '<div style="background:#1D9E75;border-radius:8px;padding:10px 14px;font-size:13px;color:#fff;margin-bottom:8px;margin-left:40px">'+msg+'</div>';
  messages.innerHTML += '<div id="chatTyping" style="background:#f0f0ec;border-radius:8px;padding:10px 14px;font-size:13px;color:#888;margin-bottom:8px">⏳ Thinking...</div>';
  messages.scrollTop = messages.scrollHeight;

  chatHistory.push({role:'user', content:msg});

  try {
    var notes = curTopic.notes || '';
    var systemMsg = 'You are a helpful ICSE Grade 9 tutor. The student is studying: ' + curTopic.topic_name + ' (' + curSubject.name + '). ';
    systemMsg += 'Answer ONLY based on these chapter notes: ' + notes.slice(0,4000);
    systemMsg += ' Keep answers concise (3-5 sentences max), student-friendly, and accurate. Include memory tricks if helpful.';

    var msgs = [{role:'user',content:systemMsg+'

Student question: '+msg}];
    if(chatHistory.length>2){
      msgs = chatHistory.slice(-4).map(function(m){return{role:m.role,content:m.content};});
      msgs[0].content = systemMsg+'

'+msgs[0].content;
    }

    var d = await callClaude({model:'claude-sonnet-4-5',max_tokens:600,messages:msgs});
    var reply = d.content&&d.content[0]?d.content[0].text:'Sorry, I could not answer that.';
    chatHistory.push({role:'assistant',content:reply});

    var typing = document.getElementById('chatTyping');
    if(typing) typing.outerHTML = '<div style="background:#f0f0ec;border-radius:8px;padding:10px 14px;font-size:13px;color:#333;margin-bottom:8px;line-height:1.7">🤖 '+reply+'</div>';
    messages.scrollTop = messages.scrollHeight;
  } catch(e) {
    var typing = document.getElementById('chatTyping');
    if(typing) typing.outerHTML = '<div style="background:#FCEBEB;border-radius:8px;padding:10px 14px;font-size:13px;color:#A32D2D;margin-bottom:8px">Error: '+e.message+'</div>';
  }
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study App — Study Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.topbar{background:#1a1a1a;color:#fff;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h1{font-size:15px;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-right span{font-size:13px;color:#aaa}
.logout-btn{font-size:13px;color:#ff6b6b;cursor:pointer;background:none;border:none}
.layout{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:220px;background:#fff;border-right:0.5px solid #e5e5e0;flex-shrink:0;overflow-y:auto}
.sidebar-section{padding:12px 0;border-bottom:0.5px solid #f0f0ec}
.sidebar-section-title{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.5px;padding:0 16px 8px}
.subject-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.subject-item:hover{background:#f9f9f7}
.subject-item.active{background:#f0faf5;border-left-color:#1D9E75}
.subject-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.subject-name{font-size:13px;font-weight:500}
.subject-count{font-size:11px;color:#999;margin-top:1px}
.main{flex:1;overflow-y:auto;padding:20px}
.page-header{margin-bottom:20px}
.page-header h2{font-size:20px;font-weight:600}
.page-header p{font-size:14px;color:#666;margin-top:4px}
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.topic-card{background:#fff;border-radius:12px;padding:16px;cursor:pointer;border:0.5px solid #e5e5e0;transition:all .15s}
.topic-card:hover{border-color:#1D9E75;transform:translateY(-1px)}
.topic-card.completed{border-left:3px solid #1D9E75}
.topic-num{font-size:11px;color:#999;margin-bottom:4px}
.topic-name{font-size:13px;font-weight:500;line-height:1.4}
.topic-tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.topic-tag{font-size:10px;padding:2px 6px;border-radius:8px;background:#f0f0ec;color:#666}
.topic-tag.done{background:#E1F5EE;color:#085041}
.new-topic-card{background:#f9f9f7;border:1.5px dashed #ddd;border-radius:12px;padding:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100px;transition:all .15s}
.new-topic-card:hover{border-color:#1D9E75;background:#f0faf5}
.new-topic-card span{font-size:13px;color:#999;margin-top:6px}

/* Topic detail view */
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:#666;cursor:pointer;margin-bottom:16px;padding:6px 0;border:none;background:none}
.back-btn:hover{color:#1a1a1a}
.topic-header{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;border:0.5px solid #e5e5e0}
.topic-header h2{font-size:18px;font-weight:600;margin-bottom:4px}
.topic-header p{font-size:13px;color:#666}
.topic-badges{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.topic-badge{font-size:11px;padding:3px 8px;border-radius:10px;background:#E1F5EE;color:#085041}
.tab-bar{display:flex;background:#fff;border-radius:10px;border:0.5px solid #e5e5e0;margin-bottom:16px;overflow:hidden}
.tab{flex:1;padding:10px 8px;font-size:13px;cursor:pointer;color:#666;border:none;background:none;transition:all .15s;font-weight:500}
.tab.active{background:#1D9E75;color:#fff}
.tab-content{background:#fff;border-radius:12px;padding:20px;border:0.5px solid #e5e5e0;min-height:300px}

/* Upload section */
.upload-area{border:2px dashed #ddd;border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px}
.upload-area:hover,.upload-area.dragover{border-color:#1D9E75;background:#f0faf5}
.upload-area input{display:none}
.upload-icon{font-size:32px;margin-bottom:8px}
.upload-text{font-size:14px;font-weight:500;color:#333}
.upload-sub{font-size:12px;color:#999;margin-top:4px}
.uploaded-files{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:16px}
.file-thumb{background:#f5f5f0;border-radius:8px;padding:10px;text-align:center;font-size:11px;color:#666;border:0.5px solid #e5e5e0;position:relative}
.file-thumb img{width:100%;height:70px;object-fit:cover;border-radius:6px;margin-bottom:4px}
.file-remove{position:absolute;top:4px;right:4px;background:#ff6b6b;color:#fff;border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}
.btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:#1D9E75;color:#fff}
.btn-primary:hover{background:#17896A}
.btn-primary:disabled{background:#ccc;cursor:not-allowed}
.btn-secondary{background:#f0f0ec;color:#333}
.btn-finish{background:#1a1a1a;color:#fff;width:100%;padding:14px;font-size:15px;margin-top:12px}
.btn-finish:hover{background:#333}
.btn-finish:disabled{background:#ccc}
.progress-bar{height:6px;background:#f0f0ec;border-radius:3px;margin:12px 0;overflow:hidden}
.progress-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width .3s}
.status-msg{font-size:13px;color:#666;text-align:center;padding:8px}
.page-counter{background:#E1F5EE;color:#085041;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;display:inline-block;margin-bottom:12px}

/* Notes styles */
.notes-content h3{font-size:15px;font-weight:600;margin:16px 0 8px;color:#1a1a1a}
.notes-content h3:first-child{margin-top:0}
.notes-content p{font-size:14px;color:#333;line-height:1.75;margin-bottom:10px}
.notes-content ul{padding-left:20px;margin-bottom:10px}
.notes-content li{font-size:14px;color:#333;line-height:1.75;margin-bottom:4px}
.notes-content .formula{background:#f5f5f0;border:0.5px solid #ddd;border-radius:8px;padding:10px 14px;font-family:monospace;font-size:13px;margin:8px 0;text-align:center}
.notes-content .highlight{background:#FFF9E6;border-left:3px solid #F59E0B;padding:10px 14px;border-radius:0 8px 8px 0;margin:10px 0;font-size:14px}
.notes-content .mnemonic{background:#FAEEDA;border-radius:8px;padding:10px 14px;margin:8px 0;font-size:13px;color:#633806}
.notes-content table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.notes-content th{background:#f5f5f0;padding:8px 12px;text-align:left;font-weight:500;border-bottom:1px solid #e5e5e0}
.notes-content td{padding:8px 12px;border-bottom:0.5px solid #f0f0ec;color:#444;line-height:1.5}

/* Flashcards */
.fc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.fc{border:0.5px solid #e5e5e0;border-radius:12px;padding:14px;cursor:pointer;min-height:90px;display:flex;flex-direction:column;justify-content:center;text-align:center;transition:all .2s;background:#fff}
.fc:hover{border-color:#1D9E75}
.fc.flipped{background:#f0faf5;border-color:#1D9E75}
.fc-q{font-size:13px;font-weight:500;line-height:1.4}
.fc-a{font-size:12px;color:#085041;margin-top:8px;display:none;line-height:1.5}
.fc.flipped .fc-a{display:block}
.fc.flipped .fc-q{color:#085041}
.fc-hint{font-size:11px;color:#bbb;margin-top:6px}
.fc.flipped .fc-hint{display:none}

/* Quiz */
.quiz-item{border:0.5px solid #e5e5e0;border-radius:12px;padding:16px;margin-bottom:12px}
.quiz-q{font-size:14px;font-weight:500;margin-bottom:10px;line-height:1.5}
.quiz-opts{display:flex;flex-direction:column;gap:6px}
.quiz-opt{padding:9px 14px;border:0.5px solid #e5e5e0;border-radius:8px;font-size:13px;cursor:pointer;text-align:left;background:#fff;transition:background .15s}
.quiz-opt:hover:not(:disabled){background:#f5f5f0}
.quiz-opt.correct{background:#E1F5EE;border-color:#1D9E75;color:#085041}
.quiz-opt.wrong{background:#FCEBEB;border-color:#E24B4A;color:#A32D2D}
.quiz-exp{font-size:12px;color:#666;margin-top:8px;padding:8px;background:#f9f9f7;border-radius:8px;display:none;line-height:1.5}
.score-banner{background:#1D9E75;color:#fff;border-radius:10px;padding:14px;text-align:center;margin-bottom:16px}
.score-banner h3{font-size:18px;font-weight:600}
.score-banner p{font-size:13px;margin-top:2px;opacity:0.85}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:440px}
.modal h3{font-size:17px;font-weight:600;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:500;color:#444;margin-bottom:5px}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#1D9E75}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}

/* Simulation */
.sim-frame{width:100%;min-height:400px;border:none;border-radius:8px}
.sim-placeholder{text-align:center;padding:48px 24px;color:#999}

.empty-state{text-align:center;padding:48px 24px;color:#999}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.4}
.empty-title{font-size:16px;font-weight:500;color:#555}
.empty-sub{font-size:13px;margin-top:6px;line-height:1.6}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.9);display:none;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid #e5e5e0;border-top-color:#1D9E75;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:#666}
.loading-sub{font-size:12px;color:#999}
</style>
</head>
<body>

<div class="topbar">
  <h1>📚 Study App</h1>
  <div class="topbar-right">
    <span id="studentName"></span>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-section-title">Subjects</div>
      <div id="subjectList"></div>
    </div>
  </div>
  <div class="main" id="mainContent">
    <div class="empty-state">
      <div class="empty-icon">👈</div>
      <div class="empty-title">Select a subject</div>
      <div class="empty-sub">Choose a subject from the left to start studying</div>
    </div>
  </div>
</div>

<!-- New Topic Modal -->
<div class="modal-overlay" id="newTopicModal">
  <div class="modal">
    <h3>Start New Topic</h3>
    <div class="form-group">
      <label>Topic / Chapter Name</label>
      <input type="text" id="newTopicName" placeholder="e.g. Laws of Motion, Hydrogen, Trigonometry...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeNewTopicModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createTopic()">Start Topic</button>
    </div>
  </div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Processing your pages...</div>
  <div class="loading-sub" id="loadingSub">This may take 30-60 seconds</div>
</div>

<script>
const SUPABASE_URL = 'https://qrsihxclhfwgcveqiyxs.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyc2loeGNsaGZ3Z2N2ZXFpeXhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3Mzg1MzMsImV4cCI6MjA5MzMxNDUzM30.tN1AbODqTjjP2mD0DYQ2t38g6-E8Qy54CS95PImazcM';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const CLAUDE_KEY_STORAGE = 'claude_api_key';
let claudeKey = localStorage.getItem(CLAUDE_KEY_STORAGE) || '';

const user = JSON.parse(sessionStorage.getItem('user') || 'null');
if(!user || user.role !== 'student') window.location.href = 'index.html';
document.getElementById('studentName').textContent = user.name;

const SUBJECTS = [
  { id:'physics', name:'Physics', icon:'⚛', color:'#378ADD', bg:'#E6F1FB' },
  { id:'chemistry', name:'Chemistry', icon:'🧪', color:'#1D9E75', bg:'#E1F5EE' },
  { id:'biology', name:'Biology', icon:'🌿', color:'#D85A30', bg:'#FAECE7' },
  { id:'maths', name:'Mathematics', icon:'∑', color:'#BA7517', bg:'#FAEEDA' },
  { id:'geography', name:'Geography', icon:'🌍', color:'#534AB7', bg:'#EEEDFE' },
  { id:'history', name:'History', icon:'📜', color:'#5F5E5A', bg:'#F1EFE8' },
];

let currentSubject = null;
let currentTopic = null;
let currentTab = 'upload';
let uploadedImages = [];
let allTopics = [];
let quizAnswered = 0;
let quizScore = 0;

// Check for API key
if(!claudeKey) {
  setTimeout(() => {
    const key = prompt('Please enter your Claude API key to enable AI features:\n(Get it from console.anthropic.com → API Keys)');
    if(key) { localStorage.setItem(CLAUDE_KEY_STORAGE, key); claudeKey = key; }
  }, 500);
}

async function loadTopics() {
  const { data } = await supabase.from('topics').select('*').eq('user_id', user.id);
  allTopics = data || [];
  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById('subjectList');
  list.innerHTML = SUBJECTS.map(s => {
    const count = allTopics.filter(t => t.subject === s.id).length;
    return `<div class="subject-item ${currentSubject?.id===s.id?'active':''}" onclick="selectSubject('${s.id}')">
      <div class="subject-icon" style="background:${s.bg};color:${s.color}">${s.icon}</div>
      <div>
        <div class="subject-name">${s.name}</div>
        <div class="subject-count">${count} topic${count!==1?'s':''}</div>
      </div>
    </div>`;
  }).join('');
}

function selectSubject(id) {
  currentSubject = SUBJECTS.find(s => s.id === id);
  currentTopic = null;
  renderSidebar();
  renderSubjectView();
}

function renderSubjectView() {
  const topics = allTopics.filter(t => t.subject === currentSubject.id);
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="page-header">
      <h2>${currentSubject.icon} ${currentSubject.name}</h2>
      <p>Your study topics for ${currentSubject.name}</p>
    </div>
    <div class="topics-grid">
      ${topics.map((t,i) => `
        <div class="topic-card ${t.status==='completed'?'completed':''}" onclick="openTopic('${t.id}')">
          <div class="topic-num">Topic ${i+1}</div>
          <div class="topic-name">${t.topic_name}</div>
          <div class="topic-tags">
            ${t.notes ? '<span class="topic-tag done">Notes</span>' : ''}
            ${t.flashcards && JSON.parse(t.flashcards||'[]').length ? `<span class="topic-tag done">${JSON.parse(t.flashcards).length} cards</span>` : ''}
            ${t.quiz && JSON.parse(t.quiz||'[]').length ? `<span class="topic-tag done">${JSON.parse(t.quiz).length} Qs</span>` : ''}
            ${!t.notes ? '<span class="topic-tag">Upload pages</span>' : ''}
          </div>
        </div>`).join('')}
      <div class="new-topic-card" onclick="openNewTopicModal()">
        <div style="font-size:24px">+</div>
        <span>New Topic</span>
      </div>
    </div>`;
}

async function openTopic(id) {
  currentTopic = allTopics.find(t => t.id === id);
  uploadedImages = [];
  quizAnswered = 0; quizScore = 0;
  await supabase.from('access_logs').insert({ user_id: user.id, action: 'view', subject: currentSubject.name, topic: currentTopic.topic_name });
  renderTopicView();
}

function renderTopicView() {
  const t = currentTopic;
  const flashcards = JSON.parse(t.flashcards || '[]');
  const quiz = JSON.parse(t.quiz || '[]');
  const main = document.getElementById('mainContent');
  
  main.innerHTML = `
    <button class="back-btn" onclick="selectSubject('${currentSubject.id}')">← Back to ${currentSubject.name}</button>
    <div class="topic-header">
      <div style="font-size:12px;color:#1D9E75;font-weight:500;margin-bottom:4px">${currentSubject.name}</div>
      <h2>${t.topic_name}</h2>
      <p>${t.page_count} pages uploaded · ${t.status === 'completed' ? 'Completed' : 'In Progress'}</p>
      <div class="topic-badges">
        ${t.notes ? '<span class="topic-badge">Notes ready</span>' : ''}
        ${flashcards.length ? `<span class="topic-badge">${flashcards.length} flashcards</span>` : ''}
        ${quiz.length ? `<span class="topic-badge">${quiz.length} quiz questions</span>` : ''}
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab ${currentTab==='upload'?'active':''}" onclick="switchTab('upload')">Upload Pages</button>
      <button class="tab ${currentTab==='notes'?'active':''}" onclick="switchTab('notes')">Notes</button>
      <button class="tab ${currentTab==='flash'?'active':''}" onclick="switchTab('flash')">Flashcards</button>
      <button class="tab ${currentTab==='quiz'?'active':''}" onclick="switchTab('quiz')">Quiz</button>
      <button class="tab ${currentTab==='sim'?'active':''}" onclick="switchTab('sim')">Simulation</button>
    </div>
    <div class="tab-content" id="tabContent"></div>`;
  
  renderTab();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().replace(' ','') === tab || (tab==='flash' && t.textContent==='Flashcards') || (tab==='sim' && t.textContent==='Simulation') || (tab==='upload' && t.textContent==='Upload Pages')));
  renderTab();
}

function renderTab() {
  const tc = document.getElementById('tabContent');
  if(!tc) return;
  const t = currentTopic;
  const flashcards = JSON.parse(t.flashcards || '[]');
  const quiz = JSON.parse(t.quiz || '[]');

  if(currentTab === 'upload') {
    tc.innerHTML = `
      <div class="page-counter">📄 ${t.page_count} pages uploaded so far</div>
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()" ondragover="dragOver(event)" ondrop="dropFiles(event)">
        <input type="file" id="fileInput" multiple accept="image/*" onchange="handleFiles(this.files)">
        <div class="upload-icon">📸</div>
        <div class="upload-text">Take photos or upload images</div>
        <div class="upload-sub">Upload 2 pages at a time · JPG, PNG supported</div>
      </div>
      <div class="uploaded-files" id="uploadedFiles"></div>
      ${uploadedImages.length > 0 ? `
        <div style="display:flex;gap:10px">
          <button class="btn btn-secondary" onclick="uploadPages()" style="flex:1">Add These Pages to Notes</button>
        </div>` : ''}
      ${t.raw_content ? `
        <button class="btn btn-finish" onclick="finishChapter()" ${!claudeKey?'disabled title="Enter API key first"':''}>
          ✨ Finish Chapter — Generate Notes, Flashcards, Quiz & Simulation
        </button>
        <div style="font-size:12px;color:#999;text-align:center;margin-top:8px">This will generate all study materials from your ${t.page_count} uploaded pages</div>` : ''}
      <div class="progress-bar"><div class="progress-fill" id="uploadProgress" style="width:0%"></div></div>
      <div class="status-msg" id="uploadStatus"></div>`;
  } else if(currentTab === 'notes') {
    if(t.notes) {
      tc.innerHTML = `<div class="notes-content">${t.notes}</div>`;
    } else {
      tc.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-title">No notes yet</div><div class="empty-sub">Upload your textbook pages and click "Finish Chapter" to generate detailed notes.</div></div>`;
    }
  } else if(currentTab === 'flash') {
    if(flashcards.length) {
      tc.innerHTML = `<div style="font-size:12px;color:#666;margin-bottom:12px">Tap any card to reveal the answer · ${flashcards.length} cards total</div>
        <div class="fc-grid">${flashcards.map((f,i)=>`
          <div class="fc" id="fc${i}" onclick="this.classList.toggle('flipped')">
            <div class="fc-q">${f.q}</div>
            <div class="fc-a">${f.a}</div>
            <div class="fc-hint">tap to reveal</div>
          </div>`).join('')}</div>`;
    } else {
      tc.innerHTML = `<div class="empty-state"><div class="empty-icon">🃏</div><div class="empty-title">No flashcards yet</div><div class="empty-sub">Flashcards will be generated when you finish the chapter.</div></div>`;
    }
  } else if(currentTab === 'quiz') {
    if(quiz.length) {
      tc.innerHTML = `
        <div class="score-banner" id="scoreBanner" style="display:none">
          <h3 id="scoreText">0/${quiz.length}</h3>
          <p id="scoreMsg"></p>
        </div>
        ${quiz.map((q,qi)=>`
          <div class="quiz-item">
            <div class="quiz-q">Q${qi+1}. ${q.q}</div>
            <div class="quiz-opts">${q.opts.map((o,oi)=>`
              <button class="quiz-opt" id="qo_${qi}_${oi}" onclick="answerQuiz(${qi},${oi},${q.ans})">${String.fromCharCode(65+oi)}. ${o}</button>`).join('')}</div>
            <div class="quiz-exp" id="qexp_${qi}">${q.exp||''}</div>
          </div>`).join('')}
        <button class="btn btn-secondary" onclick="resetQuiz()" style="margin-top:8px">Reset Quiz</button>`;
      quizAnswered = 0; quizScore = 0;
    } else {
      tc.innerHTML = `<div class="empty-state"><div class="empty-icon">❓</div><div class="empty-title">No quiz yet</div><div class="empty-sub">Quiz questions will be generated when you finish the chapter.</div></div>`;
    }
  } else if(currentTab === 'sim') {
    if(t.simulation) {
      tc.innerHTML = `<div id="simContainer">${t.simulation}</div>`;
      const scripts = tc.querySelectorAll('script');
      scripts.forEach(s => { const ns = document.createElement('script'); ns.textContent = s.textContent; s.parentNode.replaceChild(ns, s); });
    } else {
      tc.innerHTML = `<div class="empty-state"><div class="empty-icon">🔬</div><div class="empty-title">No simulation yet</div><div class="empty-sub">An interactive simulation will be generated when you finish the chapter.</div></div>`;
    }
  }
}

function answerQuiz(qi, oi, ans) {
  for(let i=0;i<6;i++){
    const el=document.getElementById(`qo_${qi}_${i}`);
    if(!el)break;
    if(i===ans)el.classList.add('correct');
    else if(i===oi&&oi!==ans)el.classList.add('wrong');
    el.disabled=true;
  }
  const exp=document.getElementById(`qexp_${qi}`);
  if(exp)exp.style.display='block';
  quizAnswered++;
  if(oi===ans)quizScore++;
  const quiz = JSON.parse(currentTopic.quiz||'[]');
  if(quizAnswered===quiz.length){
    const banner=document.getElementById('scoreBanner');
    if(banner){
      banner.style.display='block';
      document.getElementById('scoreText').textContent=`${quizScore}/${quiz.length}`;
      const pct=Math.round(quizScore/quiz.length*100);
      document.getElementById('scoreMsg').textContent=pct>=80?'Excellent work! 🎉':pct>=60?'Good job! Keep studying 📚':'Review the notes and try again 💪';
    }
  }
}

function resetQuiz() { quizAnswered=0; quizScore=0; renderTab(); }

function handleFiles(files) {
  Array.from(files).forEach(f => {
    const reader = new FileReader();
    reader.onload = e => {
      uploadedImages.push({ file: f, dataUrl: e.target.result });
      renderUploadedFiles();
    };
    reader.readAsDataURL(f);
  });
}

function dragOver(e) { e.preventDefault(); document.getElementById('uploadArea').classList.add('dragover'); }
function dropFiles(e) {
  e.preventDefault();
  document.getElementById('uploadArea').classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
}

function renderUploadedFiles() {
  const c = document.getElementById('uploadedFiles');
  if(!c) return;
  c.innerHTML = uploadedImages.map((img,i) => `
    <div class="file-thumb">
      <img src="${img.dataUrl}" alt="Page ${i+1}">
      <div>Page ${i+1}</div>
      <button class="file-remove" onclick="removeImage(${i})">×</button>
    </div>`).join('');
  renderTab();
}

function removeImage(i) {
  uploadedImages.splice(i, 1);
  renderUploadedFiles();
}

async function uploadPages() {
  if(!claudeKey) { alert('Please enter your Claude API key first. Refresh the page to enter it.'); return; }
  if(uploadedImages.length === 0) return;
  
  showLoading('Reading your pages...', 'Extracting text and content');
  setProgress(10);
  
  try {
    const imageContents = uploadedImages.map(img => ({
      type: 'image',
      source: { type: 'base64', media_type: img.file.type || 'image/jpeg', data: img.dataUrl.split(',')[1] }
    }));
    
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': claudeKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: [{
          role: 'user',
          content: [
            ...imageContents,
            { type: 'text', text: `These are pages from an ICSE Grade 9 ${currentSubject.name} textbook, chapter on "${currentTopic.topic_name}". Extract ALL the text content, concepts, definitions, formulas, and examples from these pages. Return the raw extracted content in a structured way. Do not summarize — extract everything.` }
          ]
        }]
      })
    });
    
    const data = await response.json();
    const extracted = data.content?.[0]?.text || '';
    
    setProgress(60);
    
    const newRaw = (currentTopic.raw_content || '') + '\n\n--- Pages ---\n' + extracted;
    const newCount = (currentTopic.page_count || 0) + uploadedImages.length;
    
    await supabase.from('topics').update({ raw_content: newRaw, page_count: newCount, updated_at: new Date().toISOString() }).eq('id', currentTopic.id);
    await supabase.from('access_logs').insert({ user_id: user.id, action: 'upload', subject: currentSubject.name, topic: currentTopic.topic_name });
    
    currentTopic.raw_content = newRaw;
    currentTopic.page_count = newCount;
    
    const topicIdx = allTopics.findIndex(t => t.id === currentTopic.id);
    if(topicIdx >= 0) { allTopics[topicIdx].raw_content = newRaw; allTopics[topicIdx].page_count = newCount; }
    
    setProgress(100);
    uploadedImages = [];
    hideLoading();
    document.getElementById('uploadStatus').textContent = `✓ ${newCount} pages uploaded. Add more pages or click "Finish Chapter" to generate study materials.`;
    renderTopicView();
    
  } catch(e) {
    hideLoading();
    document.getElementById('uploadStatus').textContent = 'Error: ' + e.message;
  }
}

async function finishChapter() {
  if(!claudeKey) { alert('Please enter your Claude API key first.'); return; }
  if(!currentTopic.raw_content) { alert('Please upload some pages first.'); return; }
  
  showLoading('Generating your study materials...', 'This takes 30-60 seconds. Please wait.');
  setProgress(5);
  
  try {
    const prompt = `You are an expert ICSE Grade 9 ${currentSubject.name} teacher. Based on the following textbook content for the chapter "${currentTopic.topic_name}", generate comprehensive study materials.

TEXTBOOK CONTENT:
${currentTopic.raw_content}

Generate the following in a single JSON response (no markdown, just valid JSON):
{
  "notes": "HTML string with detailed notes using these tags: <h3> for section titles, <p> for paragraphs, <ul><li> for lists, <div class='formula'> for formulas/equations, <div class='highlight'> for important definitions, <div class='mnemonic'> for memory tricks, <table><thead><tr><th><tbody><tr><td> for tables. Make notes detailed, clear and exam-focused.",
  "flashcards": [{"q": "question", "a": "answer"}, ...] (minimum 10 cards covering all key concepts),
  "quiz": [{"q": "question", "opts": ["A","B","C","D"], "ans": 0, "exp": "explanation"}, ...] (minimum 8 MCQ questions, ans is 0-indexed correct option),
  "simulation": "Complete self-contained HTML string (no DOCTYPE/html/head/body tags) with an interactive simulation relevant to this topic. Include CSS in a style tag and JS in a script tag. Make it educational and interactive like PhET - use sliders, buttons, animations, canvas where appropriate. The simulation should visually demonstrate the key concept of this chapter."
}

Return ONLY valid JSON. No explanation text before or after.`;

    setProgress(20);
    
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': claudeKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 8000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    
    setProgress(70);
    const data = await response.json();
    let raw = data.content?.[0]?.text || '';
    raw = raw.replace(/```json/g,'').replace(/```/g,'').trim();
    
    let parsed;
    try { parsed = JSON.parse(raw); }
    catch(e) {
      const match = raw.match(/\{[\s\S]*\}/);
      if(match) parsed = JSON.parse(match[0]);
      else throw new Error('Could not parse AI response');
    }
    
    setProgress(90);
    
    await supabase.from('topics').update({
      notes: parsed.notes || '',
      flashcards: JSON.stringify(parsed.flashcards || []),
      quiz: JSON.stringify(parsed.quiz || []),
      simulation: parsed.simulation || '',
      status: 'completed',
      updated_at: new Date().toISOString()
    }).eq('id', currentTopic.id);
    
    await supabase.from('access_logs').insert({ user_id: user.id, action: 'finish', subject: currentSubject.name, topic: currentTopic.topic_name });
    
    currentTopic.notes = parsed.notes || '';
    currentTopic.flashcards = JSON.stringify(parsed.flashcards || []);
    currentTopic.quiz = JSON.stringify(parsed.quiz || []);
    currentTopic.simulation = parsed.simulation || '';
    currentTopic.status = 'completed';
    
    const topicIdx = allTopics.findIndex(t => t.id === currentTopic.id);
    if(topicIdx >= 0) Object.assign(allTopics[topicIdx], currentTopic);
    
    setProgress(100);
    hideLoading();
    currentTab = 'notes';
    renderTopicView();
    
  } catch(e) {
    hideLoading();
    alert('Error generating content: ' + e.message + '\n\nPlease check your API key and try again.');
  }
}

function openNewTopicModal() { document.getElementById('newTopicModal').classList.add('show'); }
function closeNewTopicModal() { document.getElementById('newTopicModal').classList.remove('show'); }

async function createTopic() {
  const name = document.getElementById('newTopicName').value.trim();
  if(!name) { alert('Please enter a topic name'); return; }
  
  const { data, error } = await supabase.from('topics').insert({
    user_id: user.id, subject: currentSubject.id, topic_name: name
  }).select().single();
  
  if(error) { alert('Error creating topic: ' + error.message); return; }
  
  allTopics.push(data);
  closeNewTopicModal();
  document.getElementById('newTopicName').value = '';
  currentTopic = data;
  currentTab = 'upload';
  renderSidebar();
  renderTopicView();
}

function showLoading(text, sub) {
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingSub').textContent = sub;
  document.getElementById('loadingOverlay').classList.add('show');
}

function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

function setProgress(pct) {
  const el = document.getElementById('uploadProgress');
  if(el) el.style.width = pct + '%';
}

function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

loadTopics();
</script>
